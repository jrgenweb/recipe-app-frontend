@let toasts = toastService.toasts$ | async;
<div class="toast-container position-fixed top-0 end-0 p-2">
  @for (toast of toasts; track toast.id) {
    <div
      class="toast align-items-center border-0 show"
      [class.text-white]="toast.type === 'warning' || 'infow'"
      [class.text-dark]="toast.type === 'primary' || 'danger' || 'success'"
      [class.bg-success]="toast.type === 'success'"
      [class.bg-primary]="toast.type === 'primary'"
      [class.bg-danger]="toast.type === 'danger'"
      [class.bg-info]="toast.type === 'info'"
      [class.bg-warning]="toast.type === 'warning'"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body">{{ toast.message }}</div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"
          aria-label="Close"
        ></button>
      </div>
    </div>
  }
</div>
