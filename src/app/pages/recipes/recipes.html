<div class="mt-3">
  <app-recipe-filter
    (changeCategoryIdEvt)="changeCategory($event)"
    (changeSearchStringEvt)="changeSearchString($event)"
    (changeCusinIdEvt)="changeCuisin($event)"
  ></app-recipe-filter>
</div>
@let recipes = recipeService.recipes$ | async;
@let favoriteRecipeIds = favoriteService.favoriteIds$ | async;
<div class="row mt-5">
  @for (recipe of recipes?.data; track $index) {
    <div class="col-6 col-md-4 col-lg-3 mb-3">
      <app-recipe-card
        [recipe]="recipe"
        [isFavorite]="favoriteRecipeIds?.includes(recipe.id) ? true : false"
      ></app-recipe-card>
    </div>
  }
</div>
@if (recipeService.loading) {
  <div class="d-flex justify-content-center align-items-center">
    <div class="spinner-border text-primary spinner-border-lg" role="status">
      <span class="visually-hidden">Betöltés...</span>
    </div>
  </div>
} @else if (!recipeService.loading && recipes?.data?.length === 0) {
  <p class="text-center my-3">Nincs találat</p>
}
<app-infinite-scroll-component (onScrollEvent)="onScroll($event)"></app-infinite-scroll-component>
