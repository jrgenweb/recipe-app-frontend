<button class="btn btn-primary d-block ms-auto my-3" routerLink="/profile/recipes/add">
  <i class="bi bi-plus"></i>
  Hozzáadás
</button>

<div class="mt-3">
  <app-recipe-filter
    (changeCategoryIdEvt)="changeCategory($event)"
    (changeSearchStringEvt)="changeSearchString($event)"
    (changeCusinIdEvt)="changeCuisine($event)"
  ></app-recipe-filter>
</div>

<div class="row mt-5">
  @for (recipe of recipeStore.myRecipes(); track recipe.id) {
    <div class="col-6 col-md-4 col-lg-3 mb-3">
      <app-my-recipe-card [recipe]="recipe"></app-my-recipe-card>
      <!-- <app-recipe-card [recipe]="recipe" [isFavorite]="recipeStore.isFavorite(recipe.id)()">
        
      </app-recipe-card>
       -->
    </div>
  }
</div>
@if (recipeStore.isLoading()) {
  <div class="d-flex justify-content-center align-items-center">
    <div class="spinner-border text-primary spinner-border-lg" role="status">
      <span class="visually-hidden">Betöltés...</span>
    </div>
  </div>
} @else if (!recipeStore.isLoading() && recipeStore.myRecipes().length === 0) {
  <p class="text-center my-3">Nincs találat</p>
}

<app-confirm-modal
  [btnCloseTitle]="'Mégse'"
  [btnConfirmTitle]="'Törlés'"
  (confirmEvt)="onConfirmDelete($event)"
  [isOpen]="isShowDeleteConfirm"
  [title]="'Törlés megerősítése'"
>
  Biztosan törölni szeretnéd a <b>"{{ selectedRecipe?.name }}"</b> -t ?
</app-confirm-modal>
<app-infinite-scroll (loadMore)="loadMore(inf)" #inf></app-infinite-scroll>
