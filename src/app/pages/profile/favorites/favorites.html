@let favorites = favoriteService.favorites$ | async;

<div class="row mt-5">
  @for (favorite of favorites?.data; track $index) {
    <div class="col-6 col-md-4 col-lg-3 mb-3">
      <app-recipe-card [recipe]="favorite.recipe" [isFavorite]="true"></app-recipe-card>
    </div>
  } @empty {
    <p class="text-center my-3">Nincsenek kedvencek</p>
  }
</div>
