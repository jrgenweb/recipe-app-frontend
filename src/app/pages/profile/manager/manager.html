<!-- Nav tabs -->
<ul class="nav nav-tabs mt-3" id="myTab" role="tablist">
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      id="home-tab"
      data-bs-toggle="tab"
      data-bs-target="#home"
      type="button"
      role="tab"
      aria-controls="home"
      aria-selected="true"
      [routerLink]="['/profile/manager/recipes']"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
    >
      Receptjeim
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      id="profile-tab"
      data-bs-toggle="tab"
      data-bs-target="#profile"
      type="button"
      role="tab"
      aria-controls="profile"
      aria-selected="false"
      routerLink="/profile/manager/categories"
      routerLinkActive="active"
    >
      Kategóriák
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      id="messages-tab"
      data-bs-toggle="tab"
      data-bs-target="#messages"
      type="button"
      role="tab"
      aria-controls="messages"
      aria-selected="false"
      routerLink="/profile/manager/ingredients"
      routerLinkActive="active"
    >
      Hozzávalók
    </button>
  </li>
</ul>

<router-outlet></router-outlet>
