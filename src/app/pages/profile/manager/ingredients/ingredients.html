<div class="table-responsive">
  <button class="btn btn-primary mt-3 d-block ms-auto" (click)="openAddIngredientModal()">
    <i class="bi bi-plus"></i>
    Hozzáadás
  </button>
  <table class="table table-hover table-striped">
    <thead>
      <tr>
        <th>Hozzávaló neve</th>
        <th class="text-center">Mértékegység</th>
        <th class="text-center">Műveletek</th>
      </tr>
    </thead>
    <tbody>
      @for (ingredient of ingredientService.ingredients$ | async; track $index) {
        <tr>
          <td>
            {{ ingredient.name }}
          </td>
          <td class="text-center">
            {{ ingredient.unit }}
          </td>
          <td class="text-center">
            <button
              class="btn-sm btn rounded-circle btn-danger me-2"
              (click)="showDeleteConfirm(ingredient)"
            >
              <i class="bi bi-trash"></i>
            </button>
            <button
              class="btn-sm btn rounded-circle btn-success"
              (click)="openAddIngredientModal(ingredient)"
            >
              <i class="bi bi-pencil"></i>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
<app-add-ingredient-modal [isOpen]="isOpenAddIngredientModal" [ingredient]="selectedIngredient">
</app-add-ingredient-modal>

<app-confirm-modal
  [isOpen]="isConfirmModalShow"
  title="Törlés megerősítése"
  (onConfirmEvt)="onConfirmModal($event)"
>
  <h3>
    Biztosan törölni szeretnéd a <b>{{ selectedIngredient?.name }}</b
    >?
  </h3>
</app-confirm-modal>
