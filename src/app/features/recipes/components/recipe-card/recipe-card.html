<div
  class="recipe-card card h-100 overflow-hidden shadow-sm border-0"
  [class.recipe-card--mobile]="isSmallScreen"
>
  <!-- Image Container -->
  <div class="recipe-card__image-container">
    <img
      class="card-img-top w-100 h-100 object-fit-cover"
      [src]="recipe.recipeImages[0]?.url || 'https://placehold.co/600x400'"
      [alt]="recipe.name"
      [title]="recipe.name"
      (error)="onImageError($event)"
    />

    @if (!isSmallScreen) {
      <div class="recipe-card__overlay"></div>
    }

    <!-- Buttons Overlay -->

    <div class="recipe-card__buttons-container z-2">
      <!-- Favorite Button -->
      @if (authService.isLoggedIn()) {
        <app-btn-favorite
          class="recipe-card__btn-favorite"
          (changeFavoriteEvt)="setFavorite($event)"
          [recipeId]="recipe.id"
          [isFavorite]="isFavorite"
          [disabled]="false"
        ></app-btn-favorite>
      }
      <!-- View Button -->
      <a
        routerLink="/recipes/{{ recipe.id }}"
        class="recipe-card__btn-view btn btn-sm btn-light"
        title="Megtekintés"
      >
        <i class="bi bi-eye"></i>
      </a>
    </div>

    <!-- Rating Desktop Only (Top left) -->
    @if (!isSmallScreen) {
      <div class="recipe-card__rating z-2">
        <app-rating
          [disabled]="!authService.isLoggedIn()"
          [avgRate]="recipe.avgRating"
          [recipeId]="recipe.id"
          (changeRateEvt)="setRate($event)"
        >
        </app-rating>
      </div>
    } @else {
      <!-- Rating Mobile Only (Top left) -->
      <div class="recipe-card__rating z-2">
        <div class="rating-display d-flex align-items-center gap-2">
          <button
            class="rating-button"
            type="button"
            [attr.aria-label]="'Értékelés: ' + recipe.avgRating"
            (click)="authService.isLoggedIn() && openRatingModal()"
          >
            <!--  [class.disabled]="!!disabled"-->

            <i class="bi bi-star-fill"></i>
            <span class="rating-value">{{ recipe.avgRating.toFixed(1) }}</span>
          </button>
        </div>
      </div>
    }
  </div>

  <!-- Card Body -->
  <div class="card-body d-flex flex-column">
    <h5 class="card-title text-truncate mb-2">{{ recipe.name | shortenPipe: 25 }}</h5>
    @if (recipe.description) {
      <p class="card-text text-muted small mb-0 flex-grow-1">
        {{ recipe.description | shortenPipe: 60 }}
      </p>
    }
    <ng-content></ng-content>
  </div>
</div>
<!-- Rating Modal Component  -->
<app-rating-modal
  [disabled]="!authService.isLoggedIn()"
  [avgRate]="recipe.avgRating"
  [recipeId]="recipe.id"
  [isModalOpen]="isShowRatingModal"
  (changeRateEvt)="setRate($event)"
></app-rating-modal>
