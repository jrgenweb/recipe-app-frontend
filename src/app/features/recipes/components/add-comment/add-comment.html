@let isLoggedIn = authService.isLoggedin$ | async;
@if (isLoggedIn) {
  <div class="rounded-2 bg-light p-2">
    <form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="text" class="form-label">Üzenet</label>
        <textarea
          class="form-control"
          name="text"
          id="text"
          rows="3"
          formControlName="text"
        ></textarea>
      </div>
      <button class="btn btn-primary d-block mx-auto" [disabled]="commentForm.invalid">
        Küldés
      </button>
    </form>
  </div>
} @else {
  <p class="my-3 text-center">Hozzászóláshoz bekell jelentkezned!</p>
}
